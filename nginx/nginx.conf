user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 110m;

    # ------------------------------------------------------------------ #
    # Gzip compression for static assets                                  #
    # ------------------------------------------------------------------ #
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/javascript application/x-javascript application/json
        application/xml application/rss+xml image/svg+xml;

    # ------------------------------------------------------------------ #
    # Upstream services                                                   #
    # ------------------------------------------------------------------ #
    upstream backend {
        server backend:8000;
    }

    upstream frontend {
        server frontend:3000;
    }

    # ------------------------------------------------------------------ #
    # Main API + Frontend server (apex domain / localhost)                #
    # ------------------------------------------------------------------ #
    server {
        listen 80;
        server_name localhost axithor.tech www.axithor.tech;

        # Health check
        location /healthz {
            proxy_pass http://backend;
        }

        # All API traffic
        location /api/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # OpenAPI docs
        location ~ ^/(docs|redoc|openapi.json) {
            proxy_pass http://backend;
        }

        # Frontend (Next.js)
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }

    # ------------------------------------------------------------------ #
    # Wildcard subdomain — static website serving (Module 4)              #
    # ------------------------------------------------------------------ #
    server {
        listen 80;
        server_name ~^(?P<subdomain>.+)\.axithor\.tech$;

        # Extract subdomain and forward to backend serving layer
        location / {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Subdomain $subdomain;

            # Module 7 — cache headers for static assets
            proxy_cache_valid 200 1h;
            add_header X-Cache-Status $upstream_cache_status;
        }

        # Cache static file types at Nginx edge
        location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;

            expires 1h;
            add_header Cache-Control "public, max-age=3600, immutable";
            add_header Vary "Accept-Encoding";
        }
    }
}
